# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: gpm
    binary: gpm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

nfpms:
  - id: gpm-nfpm
    package_name: gpm
    vendor: mexirica
    homepage: https://github.com/mexirica/gpm
    maintainer: mexirica <mexirica@users.noreply.github.com>
    description: A TUI package manager for APT-based Linux distributions.
    license: MIT
    formats:
      - deb
      - rpm
    dependencies:
      - apt
    bindir: /usr/bin

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: mexirica
    name: gpm
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

publishers:
  - name: cloudsmith
    ids:
      - gpm-nfpm
    cmd: >-
      cloudsmith push {{ if eq .Format "deb" }}deb mexirica/gpm/any-distro/any-version{{ else }}rpm mexirica/gpm/any-distro/any-version{{ end }} {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}
