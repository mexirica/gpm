version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: aptui
    binary: aptui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: aptui-nfpm
    package_name: aptui
    vendor: mexirica
    homepage: https://github.com/mexirica/aptui
    maintainer: mexirica <mexirica@users.noreply.github.com>
    description: A TUI package manager for APT-based Linux distributions.
    license: MIT
    formats:
      - deb
    bindir: /usr/bin

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: mexirica
    name: aptui
