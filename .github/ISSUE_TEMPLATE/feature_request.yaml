name: Feature Request
description: Suggest an idea or request a new feature
title: "[FEATURE]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest a feature! Please provide as much detail as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      description: What problem are you trying to solve? Why is this feature needed?
      placeholder: Describe the problem or need...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: What do you propose as a solution or feature?
      placeholder: Describe your idea or solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or features?
      placeholder: List any alternatives you've considered...
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request here.
      placeholder: Add more context or examples...
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I have searched for existing issues that already request this feature.
          required: true
        - label: This feature would be useful to others.
          required: false
